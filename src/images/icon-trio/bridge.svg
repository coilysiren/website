<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <filter id="ink" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="61" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="2.4"/>
    </filter>
    <filter id="inkfine" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.026" numOctaves="2" seed="9" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="1.4"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="22"/>
      <feColorMatrix values="0 0 0 0 0.72  0 0 0 0 0.64  0 0 0 0 0.86  0 0 0 0.07 0"/>
    </filter>
    <clipPath id="disc"><circle cx="250" cy="250" r="183"/></clipPath>
  </defs>
  <rect width="500" height="500" fill="#0d0a14"/>

  <g clip-path="url(#disc)" filter="url(#inkfine)" fill="none" stroke-linecap="round">
    <ellipse cx="250" cy="250" rx="150" ry="60" stroke="#b8a4d8" stroke-width="3.5" opacity="0.4" transform="rotate(-45 250 250)"/>
    <ellipse cx="250" cy="250" rx="150" ry="60" stroke="#45cdd0" stroke-width="3.5" opacity="0.4" transform="rotate(45 250 250)"/>
  </g>
  <circle cx="364" cy="335" r="5" fill="#45cdd0" filter="url(#inkfine)"/>

  <g filter="url(#ink)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="250" cy="250" r="208" stroke="#45cdd0" stroke-width="16"/>
    <circle cx="250" cy="250" r="191.5" stroke="#b8a4d8" stroke-width="17"/>
  </g>
  <g transform="translate(0 38)">
  <g filter="url(#ink)" fill="none" stroke-linecap="round" stroke-linejoin="miter" stroke-width="27">
    <path stroke="#b8a4d8" d="M 308 190 L 206 190 L 206 250"/>
    <path stroke="#45cdd0" d="M 206 250 L 300 250"/>
    <path stroke="#b8a4d8" d="M 300 250 L 300 316 L 196 316"/>
  </g>
  </g>
  <g transform="translate(-30.0 -26.5) scale(1.12)">
  <g filter="url(#ink)" stroke-linecap="round" stroke-linejoin="round">
    <path fill="none" stroke="#45cdd0" stroke-width="16" d="M 302 116 L 232 116 Q 205 116 205 143 L 205 192"/>
    <g fill="#45cdd0" stroke="none">
      <rect x="228" y="134" width="74" height="13" rx="6.5"/>
      <rect x="228" y="156" width="56" height="13" rx="6.5"/>
      <rect x="228" y="178" width="38" height="13" rx="6.5"/>
    </g>
  </g>
  </g>
  <rect width="500" height="500" filter="url(#grain)" pointer-events="none"/>
</svg>
