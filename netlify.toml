# docs: https://docs.netlify.com/routing/redirects

[build]
  command = "pnpm build"
  publish = "public"

[build.environment]
  NETLIFY_USE_PNPM = "true"
  NODE_VERSION = "22"

[[redirects]]
  from = "/about"
  to = "/now"

[[redirects]]
  from = "/posts/2019-12-25-golang-pr-field-notes-part-1"
  to = "/posts/golang-pr-notes-1"

[[redirects]]
  from = "/posts/2019-12-26-golang-pr-field-notes-part-2"
  to = "/posts/golang-pr-notes-2"

[[redirects]]
  from = "/posts/2019-12-29-golang-pr-field-notes-part-3"
  to = "/posts/golang-pr-notes-3"
