name: Refresh pulse data

on:
  schedule:
    # Daily at 10:00 UTC (~3am PT).
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - name: Fetch pulse data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: pnpm fetch-pulse-data

      - name: Commit to main if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        # Direct-push to main via GraphQL createCommitOnBranch. Commits
        # made through the GitHub API are signed by github-web-flow,
        # which satisfies the required_signatures branch protection
        # rule that blocks `git push` from github-actions[bot].
        run: |
          set -euo pipefail
          if git diff --quiet -- scripts/pulse-data.yaml; then
            echo "no changes"
            exit 0
          fi
          DATE="$(date -u +%Y-%m-%d)"
          HEAD_OID="$(git rev-parse HEAD)"
          CONTENTS_B64="$(base64 < scripts/pulse-data.yaml | tr -d '\n')"
          gh api graphql \
            -f query='
              mutation($repo: String!, $branch: String!, $oid: GitObjectID!, $path: String!, $contents: Base64String!, $headline: String!) {
                createCommitOnBranch(input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                  expectedHeadOid: $oid,
                  fileChanges: { additions: [{ path: $path, contents: $contents }] },
                  message: { headline: $headline }
                }) { commit { oid url } }
              }' \
            -f repo="$REPO" \
            -f branch="$DEFAULT_BRANCH" \
            -f oid="$HEAD_OID" \
            -f path="scripts/pulse-data.yaml" \
            -f contents="$CONTENTS_B64" \
            -f headline="chore(pulse): refresh data ${DATE}"
