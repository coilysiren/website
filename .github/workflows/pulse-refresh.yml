name: Refresh pulse data

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - name: Fetch pulse data
        env:
          GITHUB_TOKEN: ${{ secrets.PULSE_REFRESH_PAT }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: pnpm fetch-pulse-data

      - name: Commit to main if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if git diff --quiet -- scripts/pulse-data.yaml; then
            echo "no changes"
            exit 0
          fi
          DATE="$(date -u +%Y-%m-%d)"
          HEAD_OID="$(git rev-parse HEAD)"
          CONTENTS_B64="$(base64 < scripts/pulse-data.yaml | tr -d '\n')"
          gh api graphql \
            -f query='
              mutation($repo: String!, $branch: String!, $oid: GitObjectID!, $path: String!, $contents: Base64String!, $headline: String!) {
                createCommitOnBranch(input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                  expectedHeadOid: $oid,
                  fileChanges: { additions: [{ path: $path, contents: $contents }] },
                  message: { headline: $headline }
                }) { commit { oid url } }
              }' \
            -f repo="$REPO" \
            -f branch="$DEFAULT_BRANCH" \
            -f oid="$HEAD_OID" \
            -f path="scripts/pulse-data.yaml" \
            -f contents="$CONTENTS_B64" \
            -f headline="chore(pulse): refresh data ${DATE}"

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          DATE_UTC="$(date -u +%Y-%m-%d)"
          BODY_FILE="$(mktemp)"
          cat > "$BODY_FILE" <<EOF
          > 🤖 Filed by Claude Code on Kai's behalf.

          The pulse-refresh workflow failed on ${DATE_UTC}.

          Failed run: ${RUN_URL}

          Common causes:
          - REST \`/repos/X/commits\` returned 0 across all owned repos (auth or pagination regression; investigate before rerunning).
          - \`createCommitOnBranch\` rejected the push (HEAD moved between checkout and commit; rerun).
          - pnpm/network hiccup in earlier steps.

          Triage: open the run, find the failed step, decide whether to rerun or investigate.

          > 🤖 Filed by Claude Code on Kai's behalf.
          EOF
          gh issue create \
            --repo "$REPO" \
            --title "pulse-refresh failed ${DATE_UTC}" \
            --body-file "$BODY_FILE" \
            --label "type/fix"
          # Keep the run red even though this notify step succeeded.
          exit 1
