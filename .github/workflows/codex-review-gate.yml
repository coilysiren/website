name: codex-review-gate

# Converts Codex bot's PR comment into a required check so branch protection
# can block auto-merge until the optimistic parser sees the clean phrase.

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  checks: write
  pull-requests: read
  contents: read

jobs:
  pending:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Post pending check on PR head
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'codex-review-gate',
              head_sha: context.payload.pull_request.head.sha,
              status: 'in_progress',
              output: {
                title: 'Waiting for Codex review',
                summary: 'Codex has not posted a review comment yet. Mention @codex on the PR if it stalls.',
              },
            });

  gate:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null && github.event.comment.user.login == 'chatgpt-codex-connector[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Parse Codex comment and update check
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body || '';
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });
            const head_sha = pr.data.head.sha;

            const clean = /Didn't find any major issues/i.test(body);
            const conclusion = clean ? 'success' : 'failure';
            const title = clean
              ? 'Codex found no major issues'
              : 'Codex flagged issues - review the comment';
            const summary = clean
              ? 'Optimistic parser matched the clean phrase. Auto-merge unblocked.'
              : 'Codex posted a review comment that did not match the clean phrase. Resolve the findings, then re-mention @codex.';

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'codex-review-gate',
              head_sha,
              status: 'completed',
              conclusion,
              output: { title, summary },
            });
