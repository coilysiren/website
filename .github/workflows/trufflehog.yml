name: TruffleHog

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly full rescan
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog (git, offline)
        run: |
          cat > /tmp/trufflehog-exclude <<'EOF'
          (^|/)package-lock\.json$
          (^|/)yarn\.lock$
          (^|/)pnpm-lock\.yaml$
          EOF
          docker run --rm \
            -v "${{ github.workspace }}:/pwd:ro" \
            -v /tmp/trufflehog-exclude:/exclude:ro \
            trufflesecurity/trufflehog:latest \
            git file:///pwd \
            --no-verification --no-update --fail \
            --exclude-paths=/exclude
