version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: weekly
    day: saturday
    time: "11:00"
    timezone: America/Los_Angeles
  # Transitive deps pinned by Gatsby 5.16 and Cypress. The patched versions are
  # major-bump breaking changes (file-type@21 ESM-only, uuid@14) that would
  # break the parent packages. Revisit when Gatsby bumps upstream.
  ignore:
  - dependency-name: file-type
  - dependency-name: webpack
  - dependency-name: path-to-regexp
  - dependency-name: lodash
  - dependency-name: uuid
